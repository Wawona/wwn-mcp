name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  nix-build:
    name: Build flake (Nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Flake check
        run: nix flake check --no-build
      - name: Build wwn-mcp package
        run: nix build .#wwn-mcp --print-build-logs

  python-lint-test:
    name: Lint + unit tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src
      - name: Pytest
        run: pytest -q
