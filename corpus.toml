# ---------------------------------------------------------------------------
# Build-system reference: nixpkgs (HUGE; scoped to relevant subtrees only).
# Pin ref to Wawona's flake.lock rev at deploy time.
# ---------------------------------------------------------------------------
[[source]]
name = "nixpkgs"
project = "nixpkgs"
kind = "git"
url = "https://github.com/NixOS/nixpkgs"
ref = "nixpkgs-unstable"
description = "Build-system reference; scoped to lib/doc/build-support + cross infra."
license = "MIT"
include = [
  "lib/**/*.nix",
  "doc/**/*.md",
  "doc/**/*.xml",
  "pkgs/build-support/**/*.nix",
  "pkgs/development/compilers/llvm/**/*.nix",
  "pkgs/stdenv/**/*.nix",
]
exclude = ["pkgs/applications/**", "pkgs/servers/**", "pkgs/games/**"]
# Only materialize these subtrees (cone mode) so we don't check out the whole
# multi-GB tree just to index a few dirs.
sparse = ["lib", "doc", "pkgs/build-support", "pkgs/stdenv", "pkgs/development/compilers/llvm"]

# ---------------------------------------------------------------------------
# crate2nix — Wawona's Rust backend is split crate-by-crate into separate Nix
# derivations with crate2nix, so a single crate failure is isolated and the
# backend rebuilds incrementally. Index the full repo: docs/ (the mdBook that
# powers nix-community.github.io/crate2nix), the Nix API (tools.nix, default.nix,
# nix/, lib/ incl. build-from-json.nix), README/CHANGELOG, and the sample
# projects/flake templates for end-to-end examples.
# ---------------------------------------------------------------------------
[[source]]
name = "crate2nix"
project = "crate2nix"
kind = "git"
url = "https://github.com/nix-community/crate2nix"
ref = "master"
description = "crate2nix: generate per-crate Nix derivations from Cargo.toml/Cargo.lock for incremental Rust builds (Cargo.nix, JSON output, tools.nix generatedCargoNix/appliedCargoNix, crate overrides, IFD vs manual strategies)."
license = "Apache-2.0 / MIT"
platform = ["all"]
include = [
  "docs/**/*.md",
  "*.md",
  "tools.nix",
  "default.nix",
  "shell.nix",
  "nix/**/*.nix",
  "lib/**/*.nix",
  "templates/**/*.nix",
  "sample_projects/**/Cargo.nix",
  "sample_projects/**/*.md",
]
exclude = ["crate2nix/templates/**/Cargo.nix", "**/target/**"]

