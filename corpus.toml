# ---------------------------------------------------------------------------
# macOS internals / reverse-engineering: Mach-O, dyld, Mach, XNU, launchd.
# iland replaces WindowServer/SkyLight by injecting .dylibs and standing up a
# custom IOSurface/Metal-backed framebuffer that mimics DRM/KMS, so WWN-MCP must
# understand the Mach-O binary format, framework/.dylib creation + loading
# (install names, @rpath, two-level namespace, DYLD_INSERT_LIBRARIES), the Mach
# microkernel APIs, the XNU kernel, and launchd. Authoritative + offline source:
# Apple's own open-source distributions.
# ---------------------------------------------------------------------------

# XNU: the Mach microkernel + BSD. Enormous, so shallow + sparse cone to the Mach
# APIs, key BSD sys headers, and the Mach-O format headers.
[[source]]
name = "xnu"
project = "macos-internals"
kind = "git"
url = "https://github.com/apple-oss-distributions/xnu"
ref = "main"
description = "XNU kernel: Mach APIs (osfmk/mach: ports/tasks/threads/vm/messages + MIG .defs), BSD syscalls (bsd/sys), and the canonical Mach-O format header (EXTERNAL_HEADERS/mach-o/loader.h: load commands, segments, dylib/dylinker)."
license = "APSL-2.0 (reference only)"
platform = ["macos", "ios"]
include = [
  "osfmk/mach/**/*.h",
  "osfmk/mach/**/*.defs",
  "osfmk/kern/**/*.h",
  "bsd/sys/**/*.h",
  "EXTERNAL_HEADERS/mach-o/**/*.h",
  "iokit/IOKit/**/*.h",
  "doc/**/*.md",
  "**/*.md",
]
sparse = ["osfmk/mach", "osfmk/kern", "bsd/sys", "EXTERNAL_HEADERS", "iokit/IOKit", "doc"]

# dyld: the dynamic linker. How frameworks/.dylibs are found, loaded, and bound
# (dyld_priv.h, dyld_images.h, interposing, the shared cache, @rpath resolution).
[[source]]
name = "dyld"
project = "macos-internals"
kind = "git"
url = "https://github.com/apple-oss-distributions/dyld"
ref = "main"
description = "Apple dyld dynamic linker: dylib/framework loading + binding, interposing/DYLD_INSERT_LIBRARIES, the dyld shared cache, dyld_images.h/dyld_priv.h, @rpath/@executable_path/@loader_path."
license = "APSL-2.0 (reference only)"
platform = ["macos", "ios"]
include = ["include/**/*.h", "doc/**", "**/*.md"]

# cctools: the Mach-O toolchain. Format headers + the man pages that document
# building/inspecting/patching dylibs & frameworks (otool, nm, lipo, ld,
# install_name_tool, codesign-adjacent).
[[source]]
name = "cctools"
project = "macos-internals"
kind = "git"
url = "https://github.com/apple-oss-distributions/cctools"
ref = "main"
description = "cctools: Mach-O format headers (include/mach-o: loader.h, fat.h, nlist.h, reloc.h) + man pages for otool, nm, lipo, ld, install_name_tool — creating/inspecting/relinking .dylib & .framework Mach-O binaries."
license = "APSL-2.0 (reference only)"
platform = ["macos", "ios"]
include = ["include/mach-o/**/*.h", "man/**", "RelNotes/**", "**/*.md"]

# launchd: the macOS init/service manager (launchd.plist format, launchctl).
[[source]]
name = "launchd"
project = "macos-internals"
kind = "git"
url = "https://github.com/apple-oss-distributions/launchd"
ref = "main"
description = "launchd init/service manager: launchd.plist(5) keys, launchctl(1), launchd(8), liblaunch — how daemons/agents are declared and started on macOS."
license = "APSL-2.0 (reference only)"
platform = ["macos"]
include = ["**/*.[15]", "man/**", "**/*.md", "**/launch.h"]

