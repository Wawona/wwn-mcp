# WWN-MCP corpus manifest.
#
# Each [[source]] is one indexable corpus. Fields:
#   name        unique id (also the on-disk dir under the corpus cache)
#   project     tag used for filtered search (groups related sources)
#   kind        git | web-mirror | rustdoc | local
#   url / urls  remote(s) for git/rustdoc/web-mirror
#   ref         git branch/tag/commit
#   path        filesystem path for kind = "local" (relative to repo root)
#   include     glob(s) to index (default: a sensible text/code set)
#   exclude     glob(s) to skip
#   platform    ["macos","ios","ipados","tvos","watchos","visionos","android","linux","all"]
#   stability   wayland family/stability tag (core/stable/staging/.../wlr/kde/...)
#   license     SPDX-ish tag, surfaced in citations (never redistributed)
#   enabled     false => fetch skips it (used when the upstream URL is unconfirmed)
#
# Nothing fetched here is committed to the repo (see .gitignore): the corpus is
# regenerated at index time into the runtime data dir.

# ---------------------------------------------------------------------------
# Wawona itself (local checkout for dev; production uses the git URL below).
# ---------------------------------------------------------------------------
[[source]]
name = "wawona"
project = "wawona"
kind = "local"
path = "../Wawona"
description = "Wawona source, docs, and the whole patched dependencies/ tree."
license = "MIT"
platform = ["all"]
include = [
  "docs/**/*.md",
  "src/**/*.rs",
  "src/**/*.{c,h,m,mm}",
  "Sources/**/*.swift",
  "android/**/*.{kt,java,c,h}",
  "dependencies/**/*.{nix,sh,py}",
  "dependencies/**/*.patch",
  "dependencies/**/*.c",
  "dependencies/**/*.h",
  "dependencies/**/*.m",
  "Cargo.toml",
  "flake.nix",
  ".github/scripts/*.py",
]
exclude = [
  "dependencies/generators/gradlegen/output/**",
  "**/target/**",
  "**/build/**",
  "**/.git/**",
  "inspirational_projects/**",
]

# Production (deploy) entry for the Wawona repo over git. Kept DISABLED locally
# on purpose: it is the SAME repo as the `wawona` local source above, so enabling
# both would double-index every Wawona file. The NixOS deploy flips this on (and
# the local source off) since there is no working checkout on the server.
[[source]]
name = "wawona-git"
project = "wawona"
kind = "git"
url = "https://github.com/Wawona/Wawona"
ref = "master"
description = "Wawona repo (deploy-time git mirror of the local `wawona` source)."
license = "MIT"
include = ["docs/**", "src/**", "Sources/**", "dependencies/**", "*.md"]
exclude = ["dependencies/generators/gradlegen/output/**", "**/.git/**", "inspirational_projects/**"]
enabled = false

