# ---------------------------------------------------------------------------
# Linux display/graphics stack: DRM / KMS / EGL / GBM.
# This is the OS-level contract a Wayland compositor expects. Wawona reimplements
# it off-Linux (iland provides DRM/KMS/EGL/GBM on Apple platforms), so the
# authoritative kernel + userspace API docs are first-class context.
# ---------------------------------------------------------------------------

# Kernel DRM/KMS internals + UAPI. torvalds/linux is enormous, so shallow
# (--depth 1) + sparse cone restricts the checkout to Documentation/gpu only.
[[source]]
name = "linux-drm-docs"
project = "drm-kms"
kind = "git"
url = "https://github.com/torvalds/linux"
ref = "master"
description = "Linux kernel DRM/KMS documentation: drm-kms, drm-uapi (ioctls), atomic modesetting, drm-mm/GEM, KMS properties, planes/CRTCs/connectors, dma-buf."
license = "GPL-2.0 (docs; reference only)"
platform = ["linux", "all"]
include = ["Documentation/gpu/**/*.rst"]
sparse = ["Documentation/gpu"]

# libdrm: the userspace DRM/KMS API (xf86drm*) + UAPI headers (drm_fourcc, modes).
[[source]]
name = "libdrm"
project = "drm-kms"
kind = "git"
url = "https://gitlab.freedesktop.org/mesa/drm"
ref = "main"
description = "libdrm userspace API (xf86drm.h / xf86drmMode.h) and DRM UAPI headers (drm.h, drm_mode.h, drm_fourcc.h: fourcc + format modifiers)."
license = "MIT"
platform = ["linux", "all"]
include = [
  "xf86drm.h",
  "xf86drmMode.h",
  "include/drm/**/*.h",
  "man/**",
  "*.rst",
  "README*",
]

# EGL: Khronos registry (the EGL spec context lives in the per-extension specs +
# headers). Includes EGL_KHR_platform_gbm, EGL_EXT_image_dma_buf_import, etc.
[[source]]
name = "egl-registry"
project = "egl"
kind = "git"
url = "https://github.com/KhronosGroup/EGL-Registry"
ref = "main"
description = "Khronos EGL registry: headers (egl.h/eglext.h/eglplatform.h) and extension specs (EGL_KHR_platform_gbm, EGL_EXT_image_dma_buf_import[_modifiers], EGL_KHR_image_base, EGL_ANDROID_*) — the buffer/display glue Wayland compositors use."
license = "Apache-2.0 / MIT (Khronos)"
platform = ["linux", "android", "all"]
include = [
  "api/EGL/**/*.h",
  "api/**/*.h",
  "extensions/**/*.txt",
  "specs/**",
  "*.md",
]

# GBM (Generic Buffer Management) + EGL implementation docs live in Mesa. Mesa is
# large, so sparse to src/gbm (the documented gbm.h) + docs/ (egl.rst etc.).
[[source]]
name = "mesa-gbm"
project = "gbm"
kind = "git"
url = "https://gitlab.freedesktop.org/mesa/mesa"
ref = "main"
description = "Mesa GBM (Generic Buffer Management) public API (src/gbm/main/gbm.h: bo, surfaces, formats, modifiers) + Mesa EGL/driconf docs — the buffer allocation layer between KMS scanout and EGL/GLES rendering."
license = "MIT"
platform = ["linux", "android", "all"]
include = [
  "src/gbm/**/*.h",
  "docs/**/*.rst",
]
exclude = ["docs/relnotes/**"]
sparse = ["src/gbm", "docs"]

